name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # Unit + integration tests (Vitest). The Playwright `_electron` e2e suite is
      # run locally (`pnpm --filter @starbase/desktop e2e`), not in CI — it needs a
      # headless/xvfb Electron and a real `git`, which is deferred.
      - name: Test
        run: pnpm test
